name: Rubocop style checks

on:
  pull_request:
    paths: ['app/**']

jobs:
  rspec:
    name: Rubocop
    runs-on: ${{ github.repository_owner == 'CMSgov' && format('codebuild-emmy-github-runner-emmy-app-{0}-{1}', github.run_id, github.run_attempt) || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby & Javascript
        uses: ./.github/actions/setup-languages
      - name: Run Rubocop
        working-directory: app
        run: bundle exec rubocop
